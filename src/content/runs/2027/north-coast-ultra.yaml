description: 50 km trailløb gennem Tisvilde Hegns skove, singletracks, klitlandskaber og slugter ved Nordsjællands kyst.
details: |
  North Coast Ultra er del af Trail Fox Series og afvikles i Tisvilde Hegn ved Tisvildeleje. 50 km-ruten byder på brede skovstier, snørklede singletracks, åbne klitlandskaber og dybe slugter langs Nordsjællands kyst.

  Start og mål er ved Naturrum Tisvildeleje, Hovedgaden 112, som er nem at nå med tog fra Hillerød (10-12 minutters gang). Der er depoter med frugt, drikkevarer og energiprodukter undervejs, og alle gennemfører modtager medalje.

  Arrangør er Nordic Endurance Events.

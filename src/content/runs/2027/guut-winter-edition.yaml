description: Holdbaseret vinterultraløb på 80 eller 60 km langs Nordsjællands kyst til Bagsværd med ITRA og UTMB Index-point.
details: |
  GUUT Winter Edition er et holdbaseret ultraløb (2–3 løbere pr. hold) med to distancer langs Nordsjællands kyst og skovlandskab til Bagsværd.

  80 km starter kl. 06 i Gilleleje med cutoff på 18 timer. 60 km starter kl. 09 i Kagerup med cutoff på 12 timer. Begge ruter slutter i Bagsværd.

  Ruten kombinerer trail og offtrail med minimalt asfalt. Vanddepoter ca. hvert 20. km. Gennemførelse inden for cutoff giver ITRA- og UTMB Index-point.

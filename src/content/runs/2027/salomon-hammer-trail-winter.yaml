description: Vintertrailløb på Bornholm med 84 km og 63 km distancer fra Hammershus med UTMB Index-point.
details: |
  Salomon Hammer Trail Winter afholdes på Bornholm i slutningen af januar med start og mål ved Brohuset nær Hammershus, Danmarks største middelalderborg. Terrænet er kuperet og byder på Bornholms karakteristiske klippelandskab og skovstier.

  84 km (50 miles) starter kl. 06, 63 km starter kl. 08. Da det bliver mørkt kl. 16:30, kræves pandelampe (min. 200 lumen) til de lange distancer. Maksimalt 800 deltagere på tværs af alle distancer.

  Løbet er godkendt af ITRA og UTMB Index og giver point på alle distancer.

details: |
  ON THE RUN – GRAVEN er et 24-timers udholdenhedsløb i Lynge Grusgrav, ca. 30 minutter nord for København. Løberne gennemfører 6,7 km loops med stejle op- og nedløb og singletrack-passager i det kuperede grusgravterræn.

  Løbet starter kl. 14 lørdag den 29. august og slutter 24 timer senere. Deltagerne vælger selv, hvor mange omgange de vil gennemføre — op til 24 loops (ca. 160 km). Base Camp fungerer som depot med vand, energi og forplejning; støttehold er begrænset til Base Camp.

  Arrangementet lægger vægt på mental robusthed og fællesskab i rå natur, med overraskende elementer integreret i ruten undervejs.

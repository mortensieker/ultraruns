description: 60 km ultratrail gennem sand, klitter, fyrreskov og kyst ved Danmarks nordligste spids.
details: |
  Skagen Odde Ultratrail (SOUT) starter og slutter ved Skagens Vippefyr og fører løberne gennem Danmarks nordligste landskab: sand, klitter, fyrreskov og kyst. 60 km-ultradistancen har fællesstart kl. 9:00 med cutoff kl. 18:00.

  Ruten følger afmærkede stier — markstier, jordstier, grusstier og sandstier — med minimal asfalt. Ved Råbjerg Mile er gamasker påkrævet. Terrænet er smukt men krævende med løs sand og kuperet klitnatur.

  Maksimalt 300 deltagere på tværs af alle distancer. Arrangør er Coast2Coast.

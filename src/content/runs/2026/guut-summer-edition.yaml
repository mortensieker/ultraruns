description: Tredages individuelt etapeløb på ca. 130 km fra Nordsjællands kyst til Bagsværd med UTMB Index-point.
details: |
  GUUT Summer Edition er et individuelt 3-etapersultraløb langs Nordsjællands kyst og skove, der slutter i Bagsværd. Alle tre etaper skal gennemføres inden for cutoff for at modtage medalje og UTMB-point.

  Etape 1 (fredag kl. 18): ca. 20 km fra Vedbæk station til Bagsværd — cutoff 5 timer. Etape 2 (lørdag kl. 08): ca. 60 km fra Kagerup station til Bagsværd — cutoff 14 timer. Etape 3 (søndag kl. 08): ca. 50 km fra Hillerød station til Bagsværd — cutoff 13 timer.

  Ruten kombinerer trail og offtrail med minimal asfalt. Der er vanddepoter ca. hvert 20. km. Løbet er godkendt af UTMB Index og ITRA.

description: Gratis ultra social-run på 100 km i 57 runder om Lemvig Sø til fordel for Psykiatrifonden.
details: |
  SøenX er et gratis community-løb på 100 km rundt om Lemvig Sø — 57 runder på den naturskønne rute langs søbredden. Løbet lægger ligesom søstereventen ØenX vægt på fællesskab og mental sundhed frem for tider og placeringer.

  Der er mulighed for at købe forplejning undervejs, og overskuddet går ubeskåret til Psykiatrifonden. Fra Aarhus er der VIP-bustransport til Lemvig for 590 kr.

description: Backyard Ultra i Rebild-skoven med 6,7 km loops i smukt naturterræn ved Vedsted Skovhus.
details: |
  Run O'Clock Backyard Ultra afholdes ved Vedsted Skovhus i Rebild-skoven nær Skørping. Løberne gennemfører 6,71 km loops — skov, singletrack og asfalt med ca. 130 hm pr. omgang — og starter en ny omgang i toppen af hver time, indtil kun én løber er tilbage.

  Ruten er velafmærket og ikke teknisk krævende. Der er overdækket camringområde og depot med vand, energiprodukter og frugt. Løberne opfordres til at medbringe egne forsyninger.

  Arrangementet varer fra 15. til 19. august og lægger vægt på fællesskab og oplevelse frem for hastighed — alle der kan løbe 6,7 km på under 60 minutter er velkomne.

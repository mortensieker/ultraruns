details: |
  Hvalsø Cannonball er et loop-baseret trailløb i Bidstrup Skovene på Sjælland.
  Ultradistancen er et 12-timers event, hvor man løber så mange 10,6 km runder
  som muligt indenfor tidsrammen. Start og mål er ved Heidi Overdrev p-plads,
  Avnstrupvej 22, 4330 Hvalsø.

  Ruten består af singletrack og grusveje gennem skoven med markant
  højdeforskel for sjællandske forhold. Den er markeret med flag i jorden og
  bånd hver 100 meter, så man kan koncentrere sig om løbet frem for navigationen.

  Hoveddepotet ved start/mål er bemandet med kolde og varme drikke, frugt,
  slik, chips og brød. Halvvejs på ruten er der et selvbetjent checkpoint
  med vand, saft og frugt. Ultradeltagere har et dedikeret depotområde til
  deres egne tasker.

  Chip-tidtagning registrerer automatisk omgangstider, og der er race briefing
  10 minutter før hvert startfelt. Stemningen beskrives som hyggelig og
  uformel — det handler om at samle runder og nyde skoven.

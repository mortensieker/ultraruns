description: Danmarks største natteløb — kryds Vendsyssel fra solnedgang til solopgang midsommernat.
details: |
  Coast2Coast er Danmarks største natteløb, der hvert år samler løbere og cykelryttere til en midsommernatstur tværs over Vendsyssel fra vestkyst til østkyst. Ultraløbere starter i Hirtshals kl. 21:21 og slutter ved Palmestranden i Frederikshavn ved solopgang.

  Arrangørerne beskriver eventet som en fest for fællesskabet frem for et stopurstræs: "Her handler det ikke om stopur og resultater — men om turen, depoternes stemning og oplevelsen hele vejen fra kyst til kyst." Ruten går gennem Vendsyssels naturskønne landskaber med mange frivilligt bemandede depoter.

  Ultra-distancerne er 50 km og 61 km løb. Der er desuden team-kategorier med cykling og kombinerede cykel/løbedistancer.

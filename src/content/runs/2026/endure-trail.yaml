description: Trailultra på Vejrhøj-ryggen i Danmarks første UNESCO-geopark med distancer fra 64 til 160 km.
details: |
  Endure Trail afvikles i Geopark Odsherred — Danmarks første UNESCO-geopark — på en 32 km-runde med over 700 højdemeter pr. omgang langs Vejrhøj-ryggen. Ultradistancerne er 64 km (2 runder), 96 km (3 runder) og 160 km/100 miles (5 runder).

  Ruten slynger sig gennem "The Mountains", Kårup Skov, Næs Skov og Ordrup Næs med udsigt over de omkringliggende vandflader. Terrænet er kuperet med både stigninger og nedstigninger.

  Der er også natteudgaver: "Sunset to Sunrise" på 64 km og "Dark Trail" på 32 km. Arrangør er Mark Andersen / Vejrhøj Trail.

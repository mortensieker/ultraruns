description: Ultra social-run på 50 km rundt om Aarhus Ø med DJ og forplejning til fordel for Psykiatrifonden.
details: |
  ØenX er en "ultra social-run" på 50 km langs havnefronten og rundt om Aarhus Ø. Løbet foregår fra kl. 10:00 til 16:00 fra Jette Tikjøbs Plads og lægger vægt på fællesskab, energi og mental sundhed frem for præstation og tider.

  Ruten på Aarhus Ø er ikke fuldt afspærret, og deltagerne krydser ingen større veje. Der er DJ-underholdning og gratis drikkevarer undervejs. Tilmeldingen inkluderer en event-t-shirt og goodie bag.

  Arrangementet er velgørende — overskuddet går ubeskåret til Psykiatrifonden. Første udgave i 2025 solgte ud med 300+ deltagere.

description: Point-to-point trailløb på 50 km langs Odsherreds nordkyst fra Gniben til Rørvig med fokus på mental sundhed.
details: |
  Ultra Trail Odsherred Coast (UTOC) er et point-to-point trailløb langs den naturskønne nordkyst af Odsherred fra vest mod øst. 50 km-ultradistancen starter nær Gniben/Søllerødlejren og slutter i Rørvig. Ruten er afmærket med orange flag.

  Terrænet er varieret: smallere stier, single tracks, stenstykker, græs, løs og fast sand, skovbund, eng og skov — minimal asfalt. Højdeforskel primært ved Klint. Arrangementet løber i 2026 for 6. gang.

  Maksimalt 100 ultradeltagere. Arrangøren sætter fokus på mental sundhed og rejser minimum 25.000 kr. til velgørende formål.

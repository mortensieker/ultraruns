description: Selvnavigeret 1000 km point-to-point fra Skagen Vippefyr til Rådhuspladsen i København med 14 dages cutoff.
details: |
  Danish Ultra 1000km er Danmarks hidtil længste ultraløb — en point-to-point rute fra Skagen Vippefyr til Rådhuspladsen i København. GPX-filen udleveres 14 dage før start; ruten er ikke afmærket og kræver GPS-navigation.

  Ruten følger primært etablerede vandreruter suppleret med grusveje, asfalt og strandstrækninger. Der er ingen vandpassager eller sumpe. Cutoffs undervejs: 250 km (Agger) efter 72 t, 500 km (Blåvand) efter 168 t, 800 km (Kerteminde) efter 288 t, og mål (København) efter 336 t.

  Løbet kan gennemføres unsupported, self-supported eller supported med crew. Startgebyret er 5.000 kr. og belønnes med 6 ITRA-point ved gennemførelse.

description: Tidsbaseret ultraløb i Skanderborg med 12, 24 og 48 timers distancer på en 1 km sløjfe i Dyrehaven.
details: |
  48-24 Skanderborg Ultraløb er et tidsbaseret løb, hvor deltagerne løber så mange kilometer som muligt inden for deres valgte tidsramme: 12, 24 eller 48 timer. Alle tre distancer starter på samme 1 km-sløjfe (400 m grus + 600 m blandet grus/fortov) i Dyrehaven ved Skanderborg Sø.

  48-timers starter fredag kl. 12:00, 24-timers lørdag kl. 12:00, og 12-timers søndag kl. 00:00. Banen er oplyst fra kl. 19:00–07:00, og der serveres suppe om natten (kl. 00:00–04:00).

  Arrangementet tilbyder brusefaciliteter, chip-timing og finishermedaljer. Telte kan opstilles med forudgående godkendelse.

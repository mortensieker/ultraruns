description: UTMB World Series-løb på Kullahalvøen i Skåne med distancer fra 53 til 173 km langs kyst, skov og bjerg.
details: |
  Kullamannen er en del af UTMB® World Series og afvikles hvert år i slutningen af oktober på Kullahalvøen i Skåne. Startstedet er Höganäs Kirke, og alle ruter ender i Båstad.

  173 km-distancen (Ultra 100 Miles, A+-kategori) passerer 15 naturreservater og to bjerge — Kullaberg og Hallandsåsen — med 2.300 højdemeter. Løbet starter fredag kl. 18:00 med 32 timers cutoff og historisk DNF-rate på 40–60 % pga. teknisk singletracks, kuling og begrænset dagslys.

  100 km-distancen følger samme start i Höganäs. The Seventh Seal (53 km) starter lørdag kl. 11:00 fra Båstad Skansen Beach og krydser Bjäre-halvøen via Sinarpsdalen og Hallandsåsen med 727 højdemeter.

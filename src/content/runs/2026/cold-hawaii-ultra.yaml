description: Point-to-point trailløb fra Vorupør til Agger gennem Thy Nationalpark med distancer fra 50 km til 100 miles.
details: |
  Cold Hawaii Ultra er et af Danmarks smukkeste og mest øde trailløb — en ægte A-til-B-rute uden runder langs Vestkysten. Alle distancer slutter i fiskerbyen Agger. 100-miles-ruten starter i Løkken og følger etablerede stier, inden alle distancer mødes på Vestkyststien.

  Terrænet er varieret og råt: sandklitter, lyngheder (sjælden beskyttet europæisk naturtype), nåleskove, fugtige lavninger og strandstrækninger. Den første halvdel af 100-miles kræver GPS; kun anden halvdel er fuldt afmærket.

  Distancerne er 50 km, 50 miles (~80 km) og 100 miles (~161 km).

description: 65 km rundt om Læsø — start direkte fra færgens bildæk ved Vesterø Havn og mål ved Guest House Læsø.
details: |
  Læsø Ultra starter direkte fra færgens bildæk, når den lægger til ved Vesterø Havn kl. ca. 9:20 — båden afgår fra Frederikshavn kl. 7:50. 65 km-ruten krydser øen via strande, grusveje, skov og naturstier med cutoff på 10 timer.

  Ruten er afmærket med pink flag (blå flag markerer distancedelinger) og har op til 7 depoter undervejs. Terrænet er varieret: grus, skovstier, græs, klitter og strand.

  Arrangøren er Coast2Coast / Læsø Adventure (Rico Eiersted og Ole Lind). I mål venter Thai-mad og forplejning på Guest House Læsø.

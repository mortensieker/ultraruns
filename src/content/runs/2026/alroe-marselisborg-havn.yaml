description: Selvnavigeret point-to-point ultraløb på 52 km fra Alrø til Marselisborg Havn langs kyster, stier og landeveje.
details: |
  En selvnavigeret point-to-point rute på 52 km fra Alrø til Marselisborg Havn i Aarhus. Ruten følges via GPX-fil på egen GPS eller smartphone og byder på ca. 3 km strand, resten fordelt på stier, markveje og cykelstier.

  Bus fra Aarhus kl. 8:00, start på Alrø kl. 9:00. Der er to depoter undervejs, og ved målstregen venter mad og drikkevarer. Cutoff er 7 timer. Deltagerne medbringer egne væsker og energi mellem depoterne.

  Arrangeret af Søren Jung, Anders Skov Nielsen og Julius Skov Nielsen med fokus på fællesskab, natur og en unik rute for både nye og erfarne ultraløbere.

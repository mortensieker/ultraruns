description: Unik ultraløb gennem kalkminerne ved Mønsted og Daugbjerg vest for Viborg.
details: |
  Kalkmineløbet er et oplevelsesløb snarere end et tidsfokuseret konkurrenceløb.
  Ruten går gennem to af Danmarks mest spektakulære kalkgruber — Mønsted og
  Daugbjerg — vest for Viborg, og bliver omtalt som et af landets hårdeste, men
  også mest mindeværdige løb.

  Depoterne er en del af løbets signatur og roses år efter år af deltagerne. På
  ruten er der kage, energidrik, frugt, øl, vin, ost og diverse snacks — det
  handler om at nyde turen frem for at jagte tider.

  Der pendler shuttlebusser mellem start- og målområderne i Mønsted og Daugbjerg,
  så man kan løbe samme rute uanset hvilken by man starter fra. Undervejs og i
  målområderne er der livemusik og stemning hele dagen.

  Ultradistancen er Badman på 52,7 km. Derudover findes en 10-timers
  "Dracula"-udfordring for dem, der vil presse sig selv længst muligt.

description: Cannonball-format 100 km på en flad 5,34 km skovsti-runde i Vestskoven arrangeret af ALOT.
details: |
  Cannonball-løbet i Vestskoven er et 100 km løb på en flad 5,34 km runde primært på grusstier med to korte tekniske sektioner (520 m og 430 m singletracks). Alle deltagere starter samtidigt kl. 9:00 — cannonball-formatet kræver, at uret løber hele vejen.

  Der er forplejning ved start/mål efter hver runde med vand, drikkevarer og snacks. Startgebyret er beskedne 100 kr. Arrangør er ALOT — Albertslund Løb & Triathlon.

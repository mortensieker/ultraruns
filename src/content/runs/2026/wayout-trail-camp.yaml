description: Tredages trail-festival ved Fort Østerlund med backyard ultra, natløb og selvvalgte distancer rundt om Silkeborg-søerne.
details: |
  Trail Camp WAYOUT er en tredages løbefestival ved Fort Østerlund Outdoor Center i Silkeborg, der kombinerer trail-løb, fællesskab og naturoplevelser.

  Lørdag afholdes "15H Last One Standing" — et klassisk backyard ultra-format med 6,7 km loops (200 hm) der starter i toppen af hver time fra kl. 08. Løbet fortsætter til der kun én løber er tilbage, med et maksimum på 15 omgange (100+ km).

  Søndag er der "7 Lakes Trail" med 10 km loops (250 hm) rundt om Silkeborg-søerne, hvor deltagerne selv vælger antal omgange. Hele weekenden byder på sociale runs, teknisk træning, bål og outdoor wellness.

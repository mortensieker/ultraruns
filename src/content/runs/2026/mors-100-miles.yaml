description: 100 miles rundt om øen Mors på en enkelt sløjfe med 26 timers cutoff.
details: |
  Mors 100 Miles er et 160 km langt ultraløb rundt om hele øen Mors på en enkelt sløjfe, der starter og slutter i Nykøbing Mors. Ruten følger primært asfalt langs øens kyst og byder på ca. 30 depoter — omtrent hvert 5. kilometer.

  Otte lokale grundejerforeninger holder vejfester undervejs og hejser løberne frem med musik og opbakning midt om natten. Arrangementet skaber en festlig og fællesskabsorienteret stemning, der minder om en øfamilie, der samles.

  Fra kl. 23 til 07 er depoteme ubemandede eller køredepot-baserede. Løberne skal medbringe egen kop. Cutoff er 26 timer (9:35 min/km).
